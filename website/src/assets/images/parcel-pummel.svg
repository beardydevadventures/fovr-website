  <text x="96" y="120" fill="#22d3ee" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="5">FOVR INTERACTIVE</text>
  <text x="96" y="805" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="92" font-weight="900" letter-spacing="-4">Parcel Pummel</text>
  <text x="101" y="850" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Chaotic VR delivery arcade</text>
</svg>
